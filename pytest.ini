[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
markers =
    contract: contract roundtrip & shape tests
    persistence: restart-survival tests (require docker)
    concurrent: cross-user / cross-session isolation under parallel load
    memeval: synthetic recall-quality fixture (fast iteration)
    longmemeval: real LongMemEval-S cleaned eval (slow, costs LLM tokens)
